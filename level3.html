<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level 3 · Reverse Engineering</title>
    <style>
        body { background: #0a1008; color: #9c9; font-family: monospace; text-align: center; padding-top: 4rem; }
        input, button { background: #1e2a1a; border: 1px solid #9c9; padding: 12px; }
    </style>
</head>
<body>
<div style="max-width:500px; margin:auto">
    <h2>🔁 LEVEL 3 · REVERSE CIPHER</h2>
    <p>📜 Source contains an encoded string: <strong>"3v3r_esrever"</strong><br>Decode it.</p>
    <input type="text" id="pwd3" placeholder="reverse it">
    <button onclick="check3()">DECODE</button>
    <p id="msg3"></p>
</div>
<!-- hint: the real key is the reverse of "3v3r_esrever" -->
<script>
    function check3() {
        let user = document.getElementById('pwd3').value;
        let encoded = "3v3r_esrever";
        let realPass = encoded.split('').reverse().join(''); // reverse engineering
        if (user === realPass) {
            window.location.href = "level4.html";
        } else {
            document.getElementById('msg3').innerText = "❌ NO MATCH";
        }
    }
</script>
</body>
</html>
